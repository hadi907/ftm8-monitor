name: ftm8 Sync

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Restore cache
        id: cache-restore
        uses: actions/cache/restore@v3
        with:
          path: ftm8_synced_sales.json
          key: ftm8-synced

      - name: Run sync
        env:
          JSONBIN_BIN_URL: ${{ secrets.JSONBIN_BIN_URL }}
          JSONBIN_API_KEY: ${{ secrets.JSONBIN_API_KEY }}
          FTM8_EMAIL: ${{ secrets.FTM8_EMAIL }}
          FTM8_PASS: ${{ secrets.FTM8_PASS }}
        run: python "farm_ftm8_sync (1).py"

      - name: Save cache
        uses: actions/cache/save@v3
        with:
          path: ftm8_synced_sales.json
          key: ftm8-synced-${{ github.run_id }}
