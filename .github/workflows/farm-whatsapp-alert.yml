name: 🌿 مزرعة هادي اسحاق — تنبيه تيليغرام
on:
  schedule:
    - cron: '0 6 * * *'   # 9:00 صباحاً بتوقيت الكويت
    - cron: '0 14 * * *'  # 5:00 مساءً بتوقيت الكويت
  workflow_dispatch:
    inputs:
      test_mode:
        description: 'أرسل رسالة تجريبية فقط'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
jobs:
  farm-alert:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: إعداد Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: تثبيت المكتبات
        run: pip install requests
      - name: تشغيل مراقب المخزون
        run: |
          if [ "${{ github.event.inputs.test_mode }}" = "true" ]; then
            python monitor.py test
          else
            python monitor.py
          fi
        env:
          JSONBIN_BIN_URL:  ${{ secrets.JSONBIN_BIN_URL }}
          JSONBIN_API_KEY:  ${{ secrets.JSONBIN_API_KEY }}
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ADMIN_EMAIL:      ${{ secrets.FTM8_EMAIL }}
          ADMIN_PASS:       ${{ secrets.FTM8_PASS }}
