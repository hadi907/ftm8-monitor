name: 🌿 مزرعة هادي اسحاق — تنبيه واتس اب

on:
  schedule:
    # 7:00 صباحاً بتوقيت الكويت (04:00 UTC)
    - cron: '0 4 * * *'
    # 12:00 ظهراً بتوقيت الكويت (09:00 UTC)
    - cron: '0 9 * * *'
    # 5:00 مساءً بتوقيت الكويت (14:00 UTC)
    - cron: '0 14 * * *'
  workflow_dispatch:  # تشغيل يدوي من GitHub

jobs:
  farm-alert:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: إعداد Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: تثبيت المكتبات
        run: pip install requests

      - name: تشغيل مراقب المخزون
        run: python monitor.py
        env:
          JSONBIN_BIN_URL:  ${{ secrets.JSONBIN_BIN_URL }}
          JSONBIN_API_KEY:  ${{ secrets.JSONBIN_API_KEY }}
          WA_PHONE:         ${{ secrets.WA_PHONE }}
          WA_APIKEY:        ${{ secrets.WA_APIKEY }}
          ADMIN_EMAIL:      ${{ secrets.FTM8_EMAIL }}
          ADMIN_PASS:       ${{ secrets.FTM8_PASS }}
