name: ftm8 Order Monitor

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run monitor
        env:
          GMAIL_USER:   ${{ secrets.GMAIL_USER }}
          GMAIL_PASS:   ${{ secrets.GMAIL_PASS }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
          WA_PHONE:     ${{ secrets.WA_PHONE }}
          WA_APIKEY:    ${{ secrets.WA_APIKEY }}
          ADMIN_EMAIL:  ${{ secrets.ADMIN_EMAIL }}
          ADMIN_PASS:   ${{ secrets.ADMIN_PASS }}
        run: python monitor.py

      - name: Save last order ID
        run: |
          git config user.name  "ftm8-bot"
          git config user.email "bot@ftm8.com"
          git add last_order_id.txt || true
          git diff --cached --quiet || git commit -m "update last order id [skip ci]"
          git push || true
