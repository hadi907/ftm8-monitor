name: 📰 نشرة الأخبار والطقس

on:
  schedule:
    # 9:00 صباحاً بتوقيت الكويت (UTC+3) = 06:00 UTC
    - cron: '0 6 * * *'
    # 5:00 مساءً بتوقيت الكويت (UTC+3) = 14:00 UTC
    - cron: '0 14 * * *'
  workflow_dispatch:  # تشغيل يدوي للاختبار

jobs:
  send-notification:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run notification script
        env:
          OWM_API_KEY:      ${{ secrets.OWM_API_KEY }}
          CALLMEBOT_PHONE:  ${{ secrets.CALLMEBOT_PHONE }}
          CALLMEBOT_KEY:    ${{ secrets.CALLMEBOT_KEY }}
        run: python news_weather_notify.py
