name: 💧 Water Reminder - هادي

on:
  schedule:
    - cron: '0 4  * * 0,2,3,5,6'
    - cron: '0 6  * * 0,2,3,5,6'
    - cron: '0 8  * * 0,2,3,5,6'
    - cron: '0 10 * * 0,2,3,5,6'
    - cron: '0 12 * * 0,2,3,5,6'
    - cron: '0 14 * * 0,2,3,5,6'
    - cron: '0 16 * * 0,2,3,5,6'
    - cron: '0 18 * * 0,2,3,5,6'
    - cron: '0 20 * * 0,2,3,5,6'
    - cron: '0 15 * * 1,4'
    - cron: '0 17 * * 1,4'
    - cron: '0 19 * * 1,4'
  workflow_dispatch:

jobs:
  send-water-reminder:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Send Water Reminder 💧
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        run: python water_reminder.py
