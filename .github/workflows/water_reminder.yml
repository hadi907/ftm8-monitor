name: 💧 Water Reminder - هادي

on:
  schedule:
    # الكويت UTC+3
    # السبت(6) الأحد(0) الثلاثاء(2) الأربعاء(3) الجمعة(5) — من 7ص إلى 11م
    - cron: '0 4  * * 0,2,3,5,6'   # 7ص  الكويت
    - cron: '0 8  * * 0,2,3,5,6'   # 11ص الكويت
    - cron: '0 12 * * 0,2,3,5,6'   # 3م  الكويت
    - cron: '0 16 * * 0,2,3,5,6'   # 7م  الكويت
    - cron: '0 20 * * 0,2,3,5,6'   # 11م الكويت
    # الاثنين(1) الخميس(4) — من 6م إلى 11م فقط
    - cron: '0 15 * * 1,4'          # 6م  الكويت
    - cron: '0 19 * * 1,4'          # 10م الكويت
  workflow_dispatch:

jobs:
  send-water-reminder:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Send Water Reminder 💧
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        run: python water_reminder.py
