name: 🌿 مزرعة هادي — تقرير المقارنة اليومي

on:
  schedule:
    - cron: '0 19 * * *'
  workflow_dispatch:

jobs:
  daily-compare:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install dependencies
        run: pip install requests openpyxl pandas

      - name: 🔍 Run comparison & send report
        env:
          XLSX_PATH:  Farm_Account.xlsx
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          EMAIL_TO:   hadi@ftm8.com
        run: python farm_compare.py
