// AUTO ALERTS — وثائق تنتهي + رصيد سلبي
// ============================================================
function checkAutoAlerts(){
  const today=new Date().toISOString().slice(0,10);
  const alertKey="autoAlerts_"+today;
  if(localStorage.getItem(alertKey)) return; // once per day only
  localStorage.setItem(alertKey,"1");

  const alerts=[];

  // 1. وثائق تنتهي قريباً أو انتهت
  D.documents.forEach(doc=>{
    if(doc.renewed) return;
    const days=du(doc.expiryDate);
    const notifyAt=+(doc.notifyDays||30);
    if(days<=notifyAt){
      const icon=days<0?"🔴":days<=7?"🟠":"🟡";
      alerts.push(`${icon} وثيقة: ${doc.name}\n   📅 ${doc.expiryDate}\n   ⏰ ${sl(days)}`);
    }
  });

  // 1b. تأمين السيارات
  D.cars.forEach(c=>{
    if(!c.insuranceExpiry) return;
    const days=du(c.insuranceExpiry);
    if(days<=60){const icon=days<0?"🔴":days<=7?"🟠":"🟡";alerts.push(`${icon} 🚗 تأمين: ${c.carName}\n   📅 ${c.insuranceExpiry}\n   ⏰ ${sl(days)}`);}
  });

  // 1c. الإقامات
  D.residencies.forEach(r=>{
    if(!r.expiryDate) return;
    const days=du(r.expiryDate);
    if(days<=60){const icon=days<0?"🔴":days<=7?"🟠":"🟡";alerts.push(`${icon} 🪪 إقامة: ${r.name}\n   📅 ${r.expiryDate}\n   ⏰ ${sl(days)}`);}
  });

  // 1d. العقود
  D.contracts.forEach(c=>{
    if(!c.endDate) return;
    const days=du(c.endDate);
    if(days<=30){const icon=days<0?"🔴":days<=7?"🟠":"🟡";alerts.push(`${icon} 📜 عقد: ${c.contractName}\n   📅 ${c.endDate}\n   ⏰ ${sl(days)}`);}
  });

  // 1e. الودائع
  D.deposits.forEach(d=>{
    if(!d.endDate) return;
    const days=du(d.endDate);
    if(days<=30){const icon=days<0?"🔴":days<=7?"🟠":"🟡";alerts.push(`${icon} 💰 وديعة: ${d.name}\n   📅 ${d.endDate}\n   ⏰ ${sl(days)}`);}
  });

  // 1f. القضايا المفتوحة — جلسات قادمة
  (D.cases||[]).filter(c=>c.caseStatus!=="مغلق"&&c.nextSession).forEach(c=>{
    const days=du(c.nextSession);
    if(days<=30){
      const icon=days<0?"🔴":days<=7?"🟠":"🟡";
      const name=c.caseNumber||c.autoNumber||"";
      alerts.push(`${icon} ⚖️ قضية${name?" ("+name+")":""}: ${c.personName||""}\n   📅 ${c.nextSession}\n   ⏰ ${sl(days)}${c.charge?"\n   📋 "+c.charge.slice(0,50):""}`);}
  });

  // 2. رصيد سلبي أو منخفض
  const ti=totI(), te=totE();
  const allTransfersAlerts=(D.savingsTransfers||[]).filter(t=>t.toBank==="الوطني"||t.toBank==="بوبيان").reduce((s,x)=>s+(+x.amount||0),0);
  const net=ti+allTransfersAlerts-te;
  if(net<0){
    alerts.push(`🚨 تحذير: المصاريف تتجاوز الدخل!\n   💸 عجز: ${fmt(Math.abs(net))}`);
  } else if(ti>0 && net/ti < 0.1){
    alerts.push(`⚠️ تنبيه: الرصيد المتبقي أقل من 10%\n   💰 الصافي: ${fmt(net)}`);
  }

  if(alerts.length===0) return;

  const txt=`🔔 تنبيهات ماليتي — ${new Date().toLocaleDateString("ar-KW")}\n\n${alerts.join("\n\n")}\n\nيرجى المراجعة والاتخاذ اللازم ✅`;
  const subject=`🔔 تنبيهات ماليتي — ${today}`;
  const email=getEmail();

  // ── فتح الإيميل تلقائياً ثم إغلاقه عبر iframe خفي ──
  if(email){
    const emailAlertKey="emailAlert_"+today;
    if(!localStorage.getItem(emailAlertKey)){

      setTimeout(()=>{
        const iframe=document.createElement("iframe");
        iframe.style.cssText="position:fixed;top:-9999px;left:-9999px;width:1px;height:1px;opacity:0;pointer-events:none";
        iframe.src=`mailto:${email}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(txt)}`;
        document.body.appendChild(iframe);
        setTimeout(()=>{
          document.body.removeChild(iframe);
          showToast(`📧 تم إرسال ${alerts.length} تنبيه إلى ${email}`,"#10b981");
        },2000);
      },1500);
    }
  } else {
    setTimeout(()=>{
      showToast(`🔔 ${alerts.length} تنبيه — أضف إيميلك لاستلامها تلقائياً`,"#f59e0b");
    },2000);
  }

  // ── إرسال التقرير الشهري تلقائياً يوم 9 ──
  if(new Date().getDate()===9 && email){
    const rptKey="monthlyReport_"+today;
    if(!localStorage.getItem(rptKey)){
      localStorage.setItem(rptKey,"1");
      setTimeout(()=>{
        const nowMIdx=new Date().getMonth();
        const nowY=new Date().getFullYear();
        const rptBody=buildMonthlyReport(MONTHS[nowMIdx],nowY,nowMIdx);
        const rptSubject=`📊 التقرير الشهري — ${MONTHS[nowMIdx]} ${nowY}`;
        const iframe2=document.createElement("iframe");
        iframe2.style.cssText="position:fixed;top:-9999px;left:-9999px;width:1px;height:1px;opacity:0;pointer-events:none";
        iframe2.src=`mailto:${email}?subject=${encodeURIComponent(rptSubject)}&body=${encodeURIComponent(rptBody)}`;
        document.body.appendChild(iframe2);
        setTimeout(()=>{
          document.body.removeChild(iframe2);
          showToast(`📊 تم فتح التقرير الشهري لإرساله إلى ${email}`,"#3b82f6");
        },2000);
      },4500);
    }
  }
}

function updateCalc(){
  const salary=+document.getElementById("calc_salary")?.value||0;
  const savePct=+document.getElementById("calc_save_pct")?.value||0;
  const expenses=+document.getElementById("calc_expenses")?.value||0;
  const saveAmt=salary*(savePct/100);
  const remaining=salary-expenses-saveAmt;
  const el=document.getElementById("calc_result");
  if(!el)return;
  const color=remaining>=0?"#4ade80":"#ef4444";
  el.innerHTML=`
    <div style="background:rgba(255,255,255,0.03);border-radius:12px;padding:14px;border:1px solid rgba(255,255,255,0.07)">
      <div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.05)">

      </div>
      <div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.05)">
        <span style="color:#94a3b8">💸 المصاريف</span>
        <span style="font-weight:800;color:#f87171">${fmt(expenses)}</span>
      </div>
      <div style="display:flex;justify-content:space-between;padding:10px 0">
        <span style="color:#94a3b8;font-weight:700">📈 المتبقي</span>
        <span style="font-weight:900;font-size:18px;color:${color}">${fmt(remaining)}</span>
      </div>
      ${remaining<0?`<div style="background:rgba(239,68,68,0.1);border-radius:8px;padding:10px;margin-top:8px;border:1px solid rgba(239,68,68,0.2)">
        <p style="margin:0;font-size:12px;color:#f87171">⚠️ المصاريف والادخار تتجاوز الراتب بـ ${fmt(Math.abs(remaining))}</p>

function delDebt(id){

<!-- Scroll Arrows -->
<button id="scroll-up" onclick="scrollStep(-1)" title="للأعلى">&#8679;</button>
<button id="scroll-down" onclick="scrollStep(1)" title="للأسفل">&#8681;</button>
<script>
(function(){
  function init(){
    const scroller=document.getElementById('content');
    const up=document.getElementById('scroll-up');
    const dn=document.getElementById('scroll-down');
    if(!scroller||!up||!dn) return;
    function upd(){
      const atTop=scroller.scrollTop<40;
      const atBot=scroller.scrollTop+scroller.clientHeight>=scroller.scrollHeight-40;
      const hasScroll=scroller.scrollHeight>scroller.clientHeight+20;
      up.classList.toggle('show',hasScroll&&!atTop);
      dn.classList.toggle('show',hasScroll&&!atBot);
    }
    scroller.addEventListener('scroll',upd,{passive:true});
    new MutationObserver(()=>setTimeout(upd,100)).observe(scroller,{childList:true,subtree:true});
    setTimeout(upd,800);
    window.scrollStep=function(dir){
      scroller.scrollBy({top:dir*scroller.clientHeight*0.65,behavior:'smooth'});
      setTimeout(upd,400);
    };
    // re-check on page navigation
    window._scrollUpd=upd;
  }
  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',init);
  else init();
})();
</script>

     📱 MOBILE JS
     ══════════════════════════════════ -->
<script>
(function(){
  const MOBILE_PAGES=['dashboard','income','expenses','reports'];
  const isMobile=()=>window.innerWidth<=768;

  // ── تحديث شريط التنقل السفلي ──
  function updateMobNav(page){
    if(!isMobile())return;
    document.querySelectorAll('.mob-nav-btn').forEach(b=>b.classList.remove('active'));
    const btn=document.getElementById('mnav-'+page);
    if(btn)btn.classList.add('active');
    else{
      const moreBtn=document.getElementById('mnav-more');
      if(moreBtn)moreBtn.classList.add('active');
    }
  }

  // ── إظهار/إخفاء زر الجرس في العنوان ──
  function updateBellBtn(){
    const bellBtn=document.getElementById('mob-bell-btn');
    const badge=document.getElementById('mob-bell-badge');
    if(!bellBtn)return;
    if(isMobile()){
      bellBtn.style.display='flex';
      const n=getNotifs?getNotifs().length:0;
      if(badge){badge.textContent=n;badge.style.display=n>0?'flex':'none';}
    }else{
      bellBtn.style.display='none';
    }
  }

  // ── Drawer ──
  window.toggleMobDrawer=function(){
    const drawer=document.getElementById('mob-drawer');
    const overlay=document.getElementById('mob-drawer-overlay');
    if(!drawer)return;
    const isOpen=drawer.classList.contains('open');
    if(isOpen){closeMobDrawer();}
    else{drawer.classList.add('open');overlay.classList.add('open');}
  };
  window.closeMobDrawer=function(){
    const drawer=document.getElementById('mob-drawer');
    const overlay=document.getElementById('mob-drawer-overlay');
    if(drawer)drawer.classList.remove('open');
    if(overlay)overlay.classList.remove('open');
  };

  // ── Hook into goPage ──
  const _origGoPage=window.goPage;
  window.goPage=function(p){
    _origGoPage(p);
    updateMobNav(p);
    closeMobDrawer();
    // scroll to top on mobile
    if(isMobile()){
      const c=document.getElementById('content');
      if(c)c.scrollTop=0;
      window.scrollTo(0,0);
    }
  };

  // ── Hook into updateBadge ──
  const _origUpdateBadge=window.updateBadge;
  window.updateBadge=function(){
    if(_origUpdateBadge)_origUpdateBadge();
    updateBellBtn();
  };

  // ── Mobile content scroll fix ──
  // On mobile, content div should scroll naturally
  function fixMobileScroll(){
    if(isMobile()){
      document.body.style.overflow='auto';
      document.body.style.height='auto';
      const app=document.getElementById('app');
      if(app){app.style.overflow='visible';app.style.height='auto';}
      const main=document.getElementById('main');
      if(main){main.style.overflow='visible';}
      const content=document.getElementById('content');
      if(content){
        content.style.overflow='visible';
        content.style.flex='none';
        content.style.height='auto';
      }
    }
  }

  // ── iOS safe area padding ──
  function applyIOSSafe(){
    const mobileNav=document.getElementById('mobile-nav');
    if(mobileNav&&isMobile()){
      // Already handled via CSS env()
    }
  }

  // ── Responsive resize handler ──
  window.addEventListener('resize',()=>{
    updateMobNav(window.currentPage||'dashboard');
    updateBellBtn();
    fixMobileScroll();
  });

  // ── Init on load ──
  function mobileInit(){
    updateMobNav('dashboard');
    updateBellBtn();
    fixMobileScroll();
    applyIOSSafe();

    // Prevent pinch zoom (optional - better UX for finance app)
    // document.addEventListener('touchmove',e=>{if(e.touches.length>1)e.preventDefault();},{passive:false});
  }

  if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',mobileInit);
  else setTimeout(mobileInit,100);
})();
</script>

</body>
</html>
