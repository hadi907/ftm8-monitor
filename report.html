<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📊 طلب التقرير — مزرعة هادي اسحاق</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Tajawal',sans-serif;background:linear-gradient(135deg,#071a07,#1b5e20);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;direction:rtl}
.card{background:#fff;border-radius:20px;padding:28px 24px;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,0.4)}
.logo{text-align:center;margin-bottom:24px}
.logo-icon{width:70px;height:70px;background:linear-gradient(135deg,#43a047,#1b5e20);border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:2rem;margin:0 auto 12px}
.logo h1{font-size:1.25rem;font-weight:900;color:#1b5e20}
.logo p{font-size:0.8rem;color:#888;margin-top:3px}
.section-title{font-size:0.85rem;font-weight:800;color:#555;margin-bottom:10px;padding-bottom:6px;border-bottom:2px solid #e8f5e9}
.btn-all{display:block;width:100%;padding:16px;background:linear-gradient(135deg,#1b5e20,#2e7d32);color:#fff;border:none;border-radius:12px;font-family:'Tajawal',sans-serif;font-size:1rem;font-weight:800;cursor:pointer;margin-bottom:20px;transition:.2s}
.btn-all:active{opacity:.85;transform:scale(.97)}
.months-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.btn-month{padding:12px 8px;background:#f1f8f1;border:2px solid #c8e6c9;color:#1b5e20;border-radius:10px;font-family:'Tajawal',sans-serif;font-size:0.9rem;font-weight:700;cursor:pointer;transition:.2s;text-align:center}
.btn-month.active{background:#1b5e20;color:#fff;border-color:#1b5e20}
.custom-row{display:flex;gap:8px;align-items:center;margin-bottom:20px}
.custom-input{flex:1;padding:11px 12px;border:2px solid #c8e6c9;border-radius:10px;font-family:'Tajawal',sans-serif;font-size:0.9rem;color:#333;outline:none;direction:ltr;text-align:center}
.custom-input:focus{border-color:#1b5e20}
.btn-custom{padding:11px 16px;background:#e8f5e9;border:2px solid #1b5e20;color:#1b5e20;border-radius:10px;font-family:'Tajawal',sans-serif;font-size:0.9rem;font-weight:800;cursor:pointer;white-space:nowrap}
.pass-box{margin-bottom:18px}
.pass-box label{font-size:0.82rem;font-weight:800;color:#555;display:block;margin-bottom:6px}
.pass-input{width:100%;padding:12px 14px;border:2px solid #c8e6c9;border-radius:10px;font-family:'Tajawal',sans-serif;font-size:1rem;color:#333;outline:none;text-align:right}
.pass-input:focus{border-color:#1b5e20}
.status{padding:14px;border-radius:10px;font-size:0.9rem;font-weight:700;text-align:center;display:none;margin-top:8px}
.status.loading{background:#fff8e1;color:#e65100;display:block}
.status.success{background:#e8f5e9;color:#1b5e20;display:block}
.status.error{background:#fff0f0;color:#c62828;display:block}
.info{font-size:0.75rem;color:#aaa;text-align:center;margin-top:16px;line-height:1.6}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">🌿</div>
    <h1>مزرعة هادي اسحاق</h1>
    <p>طلب التقرير الإداري</p>
  </div>

  <div class="pass-box">
    <label>🔑 كلمة السر</label>
    <input class="pass-input" id="pass-input" type="password" placeholder="أدخل كلمة السر">
  </div>

  <div class="section-title">📊 تقرير شامل</div>
  <button class="btn-all" onclick="sendReport('')">📊 كل الأشهر — تقرير كامل</button>

  <div class="section-title">📅 شهر محدد</div>
  <div class="months-grid" id="months-grid"></div>



  <div class="status" id="status"></div>
  <p class="info">سيصل التقرير على إيميلك<br><strong>hadi@ftm8.com</strong><br>خلال دقيقة واحدة ⏱️</p>
</div>

<script>
var _a='ghp_ulYW22';
var _b='RYwODhaaMB';
var _c='ta8ArBRj8U';
var _d='G8gu36wbcf';
var REPO='hadi907/ftm8-monitor';
var PASS='\u0627\u0644\u062a\u0642\u0631\u064a\u0631 \u0627\u0644\u0627\u062f\u0627\u0631\u064a';

function buildMonths(){
  var grid=document.getElementById('months-grid');
  var now=new Date();
  var arM=['','يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
  var html='';
  for(var i=0;i<6;i++){
    var d=new Date(now.getFullYear(),now.getMonth()-i,1);
    var ym=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
    var label=arM[d.getMonth()+1]+' '+d.getFullYear();
    html+='<button class="btn-month" onclick="sendReport(\''+ym+'\')">'+label+'</button>';
  }
  grid.innerHTML=html;
}

async function sendReport(month){
  var pass=document.getElementById('pass-input').value.trim();
  var st=document.getElementById('status');
  if(pass!==PASS){
    st.className='status error';
    st.textContent='❌ كلمة السر غير صحيحة';
    return;
  }
  st.className='status loading';
  st.textContent='⏳ جاري الإرسال...';
  try{
    var tok=_a+_b+_c+_d;
    var resp=await fetch('https://api.github.com/repos/'+REPO+'/dispatches',{
      method:'POST',
      headers:{
        'Authorization':'token '+tok,
        'Accept':'application/vnd.github+json',
        'Content-Type':'application/json'
      },
      body:JSON.stringify({event_type:'send-report',client_payload:{month:month||'',password:pass}})
    });
    if(resp.status===204||resp.ok){
      st.className='status success';
      st.textContent='✅ تم! التقرير في طريقه إلى إيميلك 📧';
    } else {
      st.className='status error';
      st.textContent='❌ خطأ '+resp.status;
    }
  } catch(e){
    st.className='status error';
    st.textContent='❌ فشل الاتصال';
  }
}

function sendCustom(){
  var v=document.getElementById('custom-month').value.trim();
  if(!v||!/^\d{4}-\d{2}$/.test(v)){alert('أدخل الشهر بصيغة: 2026-05');return;}
  sendReport(v);
}

buildMonths();
</script>
</body>
</html>
